<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Code Check</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: radial-gradient(circle at top, #1e293b, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* Card */
.card {
  background: rgba(15, 23, 42, 0.9);
  padding: 35px;
  border-radius: 16px;
  width: 340px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  animation: fadeIn 0.8s ease;
}

/* Logo */
.logo {
  width: 60px;
  margin-bottom: 15px;
  animation: pop 0.5s ease;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #020617;
  color: white;
  text-align: center;
  letter-spacing: 2px;
}

/* Button */
button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #3b82f6, #2563eb);
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

/* Message */
#message {
  margin-top: 10px;
  font-size: 13px;
  color: #94a3b8;
}

/* Spinner */
.loader {
  border: 4px solid #1e293b;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  margin: 10px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="card">

  <!-- Replace with your own logo if you want -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Gray_circles_rotate.gif" class="logo">

  <h2>Secure Code Check</h2>
  <p>Enter your 16-character code</p>

  <input 
    id="code" 
    maxlength="16" 
    placeholder="ENTER CODE"
    oninput="this.value = this.value.toUpperCase()"
  >

  <button onclick="checkCode()">Continue</button>

  <div id="spinner" style="display:none;">
    <div class="loader"></div>
  </div>

  <div id="message"></div>

</div>

<script>
async function checkCode() {
  const code = document.getElementById("code").value;
  const msg = document.getElementById("message");
  const spinner = document.getElementById("spinner");
  const btn = document.querySelector("button");

  if (!/^[A-Za-z0-9]{16}$/.test(code)) {
    msg.textContent = "Enter a valid 16-character code";
    return;
  }

  msg.textContent = "";
  spinner.style.display = "block";
  btn.disabled = true;
  btn.style.opacity = "0.6";

  try {
    const res = await fetch("/api/verify", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ code })
    });

    const data = await res.json();

    spinner.style.display = "none";
    btn.disabled = false;
    btn.style.opacity = "1";

    if (data.success) {
      msg.textContent = "Code accepted";
    } else {
      msg.textContent = "Invalid code";
    }

  } catch (err) {
    spinner.style.display = "none";
    btn.disabled = false;
    msg.textContent = "Something went wrong";
  }
}
</script>

</body>
</html>
