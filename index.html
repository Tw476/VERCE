<!DOCTYPE html>
<html>
<body style="text-align:center; margin-top:100px; font-family:Arial;">

<h2>Check Your Code</h2>
<p>Enter 16-digit code (no spaces)</p>

<input id="code" maxlength="16" placeholder="Enter code">
<br><br>

<button onclick="checkCode()">Continue</button>

<script>
async function checkCode() {
  const code = document.getElementById("code").value;

  // only allow 16 digits
  if (!/^\d{16}$/.test(code)) {
    alert("Enter a valid 16-digit code (numbers only)");
    return;
  }

  const res = await fetch("/api/verify", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ code })
  });

  const data = await res.json();

  if (data.success) {
    alert("Code accepted");
  } else {
    alert("Invalid code");
  }
}
</script>

</body>
</html>
