<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Verify</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f1f5f9;
}

.header {
  background: linear-gradient(90deg, #6d28d9, #4f46e5);
  padding: 18px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

.container {
  background: white;
  margin: -20px auto 20px;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.logo {
  text-align: center;
  margin-bottom: 10px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.step { display: none; text-align: center; }
.step.active { display: block; }

.loader {
  border: 4px solid #e2e8f0;
  border-top: 4px solid #4f46e5;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  margin: 40px auto;
  animation: spin 1s linear infinite;
}

.error { color: red; }

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <div>✔ Gift Verify</div>
</div>

<!-- STEP 1 -->
<div class="container step active" id="step1">

  <div id="cardLogo" class="logo"></div>

  <h2>Check Card</h2>

  <input id="code"
    placeholder="Enter code"
    oninput="handleInput(this)">

  <button onclick="goToVerify()">Verify</button>

  <div id="errorMsg" class="error"></div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h2>Verifying...</h2>
  <div class="loader"></div>
</div>

<!-- STEP 3 -->
<div class="container step" id="step3">
  <h2 id="resultTitle"></h2>
  <p id="resultText"></p>
  <button onclick="reset()">Try Again</button>
</div>

<script>
// detect type
function detectCardType(code) {
  if (/^A/i.test(code)) return "Apple";
  if (/^4/.test(code)) return "Visa";
  if (/^5/.test(code)) return "Mastercard";
  return "Generic";
}

// input handler
function handleInput(input) {
  input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g,'');

  const type = detectCardType(input.value);
  document.getElementById("cardLogo").textContent = type;
}

// verify
async function goToVerify() {
  const code = document.getElementById("code").value;
  const error = document.getElementById("errorMsg");

  console.log("Sending code:", code);

  if (!code) {
    error.textContent = "Enter a code";
    return;
  }

  error.textContent = "";
  showStep("step2");

  try {
    const res = await fetch("/api/verify", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code })
    });

    const data = await res.json();

    showStep("step3");

    if (data.success) {
      resultTitle.textContent = "Valid Code";
      resultText.textContent = "Code accepted";
    } else {
      resultTitle.textContent = "Invalid Code";
      resultText.textContent = "Try again";
    }

  } catch (err) {
    showStep("step3");
    resultTitle.textContent = "Error";
    resultText.textContent = "Request failed";
  }
}

function showStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function reset() {
  document.getElementById("code").value = "";
  document.getElementById("cardLogo").textContent = "";
  showStep("step1");
}
</script>

</body>
</html>
