<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Check</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: linear-gradient(135deg, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* Card */
.card {
  background: rgba(15, 23, 42, 0.9);
  padding: 35px;
  border-radius: 16px;
  width: 340px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  animation: fadeIn 0.8s ease;
}

/* Logo */
.logo {
  width: 60px;
  margin-bottom: 15px;
  animation: pop 0.5s ease;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #020617;
  color: white;
}

/* Button */
button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #3b82f6, #2563eb);
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

/* Message */
#message {
  margin-top: 10px;
  font-size: 13px;
  color: #94a3b8;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="logo">

  <h2>Check Your Code</h2>
  <p>Enter 16-character code</p>

  <input id="code" maxlength="16" placeholder="Enter code" oninput="this.value = this.value.toUpperCase()">

  <button onclick="checkCode()">Continue</button>

  <div id="message"></div>

</div>

<script>
async function checkCode() {
  const code = document.getElementById("code").value;
  const msg = document.getElementById("message");

  if (!/^[A-Za-z0-9]{16}$/.test(code)) {
    msg.textContent = "Enter a valid 16-character code";
    return;
  }

  msg.textContent = "Checking...";

  const res = await fetch("/api/verify", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ code })
  });

  const data = await res.json();

  if (data.success) {
    msg.textContent = "Code accepted";
  } else {
    msg.textContent = "Invalid code";
  }
}
</script>

</body>
</html>
