<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Verify</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #f1f5f9;
}

/* Header */
.header {
  background: linear-gradient(90deg, #6d28d9, #4f46e5);
  padding: 18px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

/* Container */
.container {
  background: white;
  margin: -20px auto 20px;
  padding: 25px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}

h1 {
  font-size: 22px;
}

/* Card Logo */
.logo {
  font-size: 30px;
  margin-bottom: 10px;
}

/* Inputs */
label {
  display: block;
  margin-top: 15px;
  font-size: 14px;
  font-weight: 600;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
}

/* Button */
button {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

/* Loader */
.loader {
  border: 4px solid #e2e8f0;
  border-top: 4px solid #4f46e5;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  margin: 40px auto;
  animation: spin 1s linear infinite;
}

.step { display: none; text-align: center; }
.step.active { display: block; }

.success { color: green; }
.error { color: red; }

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <div>✔ Gift Verify</div>
  <div>☰</div>
</div>

<!-- STEP 1 -->
<div class="container step active" id="step1">

  <div id="cardLogo" class="logo">💳</div>

  <h1>Check Card Status</h1>

  <label>Card Type</label>
  <select id="cardType" onchange="updateUI()">
    <option value="generic">Gift Card</option>
    <option value="visa">Visa</option>
    <option value="mastercard">Mastercard</option>
    <option value="apple">Apple</option>
  </select>

  <label>Currency</label>
  <select>
    <option>USD</option>
    <option>EUR</option>
    <option>GBP</option>
  </select>

  <label>Card Amount</label>
  <input id="amount" placeholder="e.g. 100">

  <label>Redemption Code</label>
  <input id="code"
    placeholder="Enter code"
    oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">

  <button onclick="goToVerify()">Check Status</button>

  <div id="errorMsg" class="error"></div>

</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h2>Verifying...</h2>
  <div class="loader"></div>
</div>

<!-- STEP 3 -->
<div class="container step" id="step3">
  <h2 id="resultTitle"></h2>
  <p id="resultText"></p>
  <button onclick="reset()">Try Again</button>
</div>

<script>
function showStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// 🎨 Change UI + logo based on card type
function updateUI() {
  const type = document.getElementById("cardType").value;
  const logo = document.getElementById("cardLogo");
  const container = document.getElementById("step1");

  if (type === "apple") {
    logo.textContent = "🍎";
    container.style.boxShadow = "0 10px 30px rgba(0,0,0,0.2)";
  } else if (type === "visa") {
    logo.textContent = "💳";
    container.style.boxShadow = "0 10px 30px rgba(37,99,235,0.3)";
  } else if (type === "mastercard") {
    logo.textContent = "💳";
    container.style.boxShadow = "0 10px 30px rgba(239,68,68,0.3)";
  } else {
    logo.textContent = "🎁";
    container.style.boxShadow = "0 10px 30px rgba(0,0,0,0.1)";
  }
}

// 🧠 Different validation per card type
function validateCode(code, type) {
  if (type === "apple") {
    return /^[A-Z0-9]{8,12}$/.test(code); // Apple style
  }
  if (type === "visa") {
    return /^[A-Z0-9]{12,16}$/.test(code);
  }
  if (type === "mastercard") {
    return /^[A-Z0-9]{10,16}$/.test(code);
  }
  return /^[A-Z0-9]{4,}$/.test(code); // default
}

async function goToVerify() {
  const code = document.getElementById("code").value;
  const type = document.getElementById("cardType").value;
  const error = document.getElementById("errorMsg");

  if (!validateCode(code, type)) {
    error.textContent = "Invalid code format for selected card";
    return;
  }

  error.textContent = "";
  showStep("step2");

  await new Promise(r => setTimeout(r, 1200));

  showStep("step3");

  if (code.startsWith("A")) {
    document.getElementById("resultTitle").textContent = "Valid Code";
    document.getElementById("resultTitle").className = "success";
    document.getElementById("resultText").textContent = type.toUpperCase() + " card verified";
  } else {
    document.getElementById("resultTitle").textContent = "Invalid Code";
    document.getElementById("resultTitle").className = "error";
    document.getElementById("resultText").textContent = "Please try again";
  }
}

function reset() {
  document.getElementById("code").value = "";
  document.getElementById("amount").value = "";
  showStep("step1");
}
</script>

</body>
</html>
