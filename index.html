<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Code Check</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: radial-gradient(circle at top, #1e293b, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* Card */
.card {
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(10px);
  padding: 35px;
  border-radius: 20px;
  width: 340px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

/* Hide steps */
.step {
  display: none;
}

.step.active {
  display: block;
  animation: fadeIn 0.5s ease;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #020617;
  color: white;
  text-align: center;
  letter-spacing: 2px;
}

/* Button */
button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #3b82f6, #2563eb);
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.04);
}

/* Spinner */
.loader {
  border: 4px solid #1e293b;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

/* Success */
.success {
  color: #22c55e;
  font-size: 18px;
  margin-top: 15px;
}

/* Error */
.error {
  color: #ef4444;
  font-size: 14px;
  margin-top: 10px;
}

/* Animations */
@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <h2>Secure Code Check</h2>
    <p>Enter your 16-character code</p>

    <input id="code" maxlength="16" placeholder="ENTER CODE"
      oninput="this.value = this.value.toUpperCase()">

    <button onclick="goToVerify()">Continue</button>

    <div id="errorMsg" class="error"></div>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <h2>Verifying...</h2>
    <div class="loader"></div>
    <p>Please wait while we process your code</p>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <h2 id="resultTitle"></h2>
    <p id="resultText"></p>

    <button onclick="reset()">Try Again</button>
  </div>

</div>

<script>
function showStep(stepId) {
  document.querySelectorAll(".step").forEach(step => {
    step.classList.remove("active");
  });
  document.getElementById(stepId).classList.add("active");
}

async function goToVerify() {
  const code = document.getElementById("code").value;
  const error = document.getElementById("errorMsg");

  if (!/^[A-Za-z0-9]{16}$/.test(code)) {
    error.textContent = "Enter a valid 16-character code";
    return;
  }

  error.textContent = "";
  showStep("step2");

  try {
    const res = await fetch("/api/verify", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ code })
    });

    const data = await res.json();

    showStep("step3");

    if (data.success) {
      document.getElementById("resultTitle").textContent = "Success";
      document.getElementById("resultText").textContent = "Code accepted";
    } else {
      document.getElementById("resultTitle").textContent = "Invalid Code";
      document.getElementById("resultText").textContent = "Please try again";
    }

  } catch (err) {
    showStep("step3");
    document.getElementById("resultTitle").textContent = "Error";
    document.getElementById("resultText").textContent = "Something went wrong";
  }
}

function reset() {
  document.getElementById("code").value = "";
  showStep("step1");
}
</script>

</body>
</html>
